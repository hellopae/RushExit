<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RUSH EXIT — Cute 3D Parking Puzzle</title>
<style>
  :root{
    --coral:#ff7d9c; --cream:rgba(255,251,242,.88); --ink:#5a4a52;
    --muted:#a99aa3; --accent:#ffb547;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#a8defa;color:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",Helvetica,Arial,sans-serif;}
  #c{position:fixed;inset:0;display:block;touch-action:none;}

  /* ---------- HUD ---------- */
  .hud{position:fixed;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
       padding:14px 16px;pointer-events:none;z-index:5;}
  .hud.top{top:0;}
  .panel{background:var(--cream);backdrop-filter:blur(8px);border:2px solid rgba(255,125,156,.35);
         border-radius:18px;padding:10px 16px;pointer-events:auto;box-shadow:0 4px 14px rgba(120,80,100,.15);}
  .brand{font-weight:800;letter-spacing:.14em;font-size:16px;color:var(--coral);}
  .brand small{display:block;letter-spacing:.2em;font-size:10px;color:var(--muted);font-weight:700;margin-top:3px;}
  .stats{display:flex;gap:18px;text-align:center;}
  .stat .num{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .stat .lab{font-size:9px;letter-spacing:.22em;color:var(--muted);margin-top:4px;font-weight:700;}
  .stat .num.accent{color:var(--coral);}

  .hud.bottom{bottom:0;align-items:flex-end;}
  .btnrow{display:flex;gap:8px;pointer-events:auto;}
  button{background:var(--cream);backdrop-filter:blur(8px);color:var(--ink);border:2px solid rgba(255,125,156,.4);
         border-radius:16px;padding:11px 16px;font-size:12px;font-weight:800;letter-spacing:.1em;cursor:pointer;
         transition:transform .12s,background .15s;font-family:inherit;box-shadow:0 3px 10px rgba(120,80,100,.15);}
  button:hover{background:#fff;transform:translateY(-2px);}
  button:active{transform:translateY(0);}
  button:disabled{opacity:.4;cursor:default;transform:none;}
  button.primary{background:var(--coral);color:#fff;border-color:var(--coral);}
  button.primary:hover{background:#ff92ac;}

  .hint{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.14em;
        font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(90,60,80,.5);z-index:4;pointer-events:none;
        transition:opacity 1s;text-align:center;white-space:nowrap;}

  /* ---------- Win overlay ---------- */
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
           background:rgba(90,74,82,.35);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .4s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .card{background:var(--cream);border:3px solid var(--coral);border-radius:26px;padding:32px 44px;
        text-align:center;transform:translateY(14px) scale(.96);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
        box-shadow:0 12px 40px rgba(120,80,100,.3);}
  .overlay.show .card{transform:translateY(0) scale(1);}
  .card h2{color:var(--coral);letter-spacing:.22em;font-size:22px;font-weight:800;}
  .stars{font-size:34px;margin:12px 0 4px;letter-spacing:.15em;}
  .stars .off{opacity:.2;filter:grayscale(1);}
  .card p{color:var(--muted);font-size:13px;font-weight:700;margin-bottom:20px;letter-spacing:.05em;}
  .card .btnrow{justify-content:center;}

  @media (max-width:560px){
    .hud{padding:10px;}
    .panel{padding:8px 12px;border-radius:15px;}
    .stats{gap:12px;}
    .stat .num{font-size:19px;}
    button{padding:10px 12px;font-size:11px;}
    .card{padding:26px 26px;margin:0 16px;}
  }
  @media (prefers-reduced-motion:reduce){ .overlay,.card,button{transition:none;} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud top">
  <div class="panel brand">RUSH EXIT<small>LEVEL <span id="lvlNum">1</span> · <span id="themeName">SUNNY PARK</span></small></div>
  <div class="panel stats">
    <div class="stat"><div class="num" id="moves">0</div><div class="lab">MOVES</div></div>
    <div class="stat"><div class="num accent" id="par">2</div><div class="lab">PAR</div></div>
  </div>
</div>

<div class="hud bottom">
  <div class="btnrow">
    <button id="prevBtn">◀ PREV</button>
    <button id="nextBtn">NEXT ▶</button>
  </div>
  <div class="btnrow">
    <button id="undoBtn">↩ UNDO</button>
    <button id="resetBtn">⟲ RESET</button>
  </div>
</div>

<div class="hint" id="hint">DRAG THE RED CAR TO THE EXIT GATE ✦ DRAG EMPTY SPACE TO LOOK AROUND</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2>LEVEL CLEAR!</h2>
    <div class="stars" id="stars"></div>
    <p id="winText"></p>
    <div class="btnrow">
      <button id="replayBtn">↺ REPLAY</button>
      <button class="primary" id="advanceBtn">NEXT LEVEL ▶</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* =====================================================================
   RUSH EXIT (Cute Edition) — Unblock-Me-style 3D sliding puzzle
   6×6 board · red car escapes through the right-side gate on row 2.
   Every level: a different world theme + a mixed fleet of cute vehicles.
   All layouts BFS-verified solvable.
   ===================================================================== */

const N = 6, EXIT_ROW = 2, CELL = 1;
const HALF = N * CELL / 2;

/* cars: [x, y, len, 'h'|'v'] — index 0 is always the red player car */
const LEVELS = [
 {par:2,  cars:[[1,2,2,'h'],[2,4,3,'h'],[0,3,2,'h'],[3,1,2,'v']]},
 {par:4,  cars:[[0,2,2,'h'],[3,2,2,'v'],[3,1,2,'h'],[4,3,3,'v'],[5,0,2,'v'],[1,4,3,'h'],[2,1,2,'v']]},
 {par:7,  cars:[[0,2,2,'h'],[0,4,2,'v'],[4,0,2,'h'],[1,0,2,'h'],[2,5,2,'h'],[1,1,3,'h'],[1,3,3,'v'],[3,2,2,'v'],[3,4,3,'h'],[5,1,2,'v'],[0,0,2,'v']]},
 {par:10, cars:[[1,2,2,'h'],[4,4,2,'h'],[0,4,2,'h'],[5,1,3,'v'],[3,3,2,'v'],[1,5,2,'h'],[0,2,2,'v'],[2,0,3,'h'],[4,2,2,'v'],[0,0,2,'v'],[2,1,2,'h']]},
 {par:14, cars:[[0,2,2,'h'],[1,1,2,'h'],[2,5,3,'h'],[0,0,2,'v'],[2,2,2,'v'],[3,1,2,'h'],[0,4,3,'h'],[0,5,2,'h'],[3,2,2,'v'],[1,0,3,'h'],[4,2,2,'v']]},
 {par:17, cars:[[2,2,2,'h'],[2,5,2,'h'],[1,0,2,'h'],[1,2,2,'v'],[3,3,2,'h'],[5,2,2,'v'],[4,0,3,'v'],[2,3,2,'v'],[1,1,2,'h'],[0,2,2,'v'],[5,4,2,'v'],[1,4,2,'v'],[3,4,2,'h'],[0,0,2,'v']]},
];

/* ---------------- world themes (one per level) ---------------- */
const THEMES = [
 { name:'SUNNY PARK', night:false,
   sky:['#6cc4f5','#a8defa','#fdf6cf'], fog:0xbfe6f7,
   ground:{base:'#86c463', speck:'#74b052', line:'rgba(255,255,255,.7)', arrow:'rgba(255,255,255,.95)'},
   slab:0x6ca34d, barrier:0xd8915f, stripe:0xfff3df, exitNeon:'#ffd34d',
   ambient:0xdcecff, sun:0xfff4d6, props:'park', clouds:true },
 { name:'BEACH BAY', night:false,
   sky:['#56b8d8','#9adce8','#ffd9a0'], fog:0xb8e2e8,
   ground:{base:'#f0d9a8', speck:'#e0c48c', line:'rgba(80,140,160,.55)', arrow:'rgba(255,255,255,.95)'},
   slab:0xd9bf8c, barrier:0xb07c4f, stripe:0xfff0d6, exitNeon:'#3fd2c7',
   ambient:0xffe8cc, sun:0xfff0d0, props:'beach', clouds:true },
 { name:'SAKURA TOWN', night:false,
   sky:['#f3b8d8','#fbd8e8','#fff2dd'], fog:0xf6d8e6,
   ground:{base:'#a8a0c0', speck:'#968ead', line:'rgba(255,255,255,.6)', arrow:'rgba(255,230,245,.95)'},
   slab:0x847c9e, barrier:0xe07a9e, stripe:0xfff0f6, exitNeon:'#ff9ec4',
   ambient:0xffe0ee, sun:0xfff0e0, props:'sakura', clouds:true },
 { name:'NEON CITY', night:true,
   sky:['#0c0e26','#27194a','#5e2a6e'], fog:0x1f1640,
   ground:{base:'#33353f', speck:'#2a2c36', line:'rgba(120,230,255,.5)', arrow:'rgba(120,230,255,.9)'},
   slab:0x262832, barrier:0x474a5a, stripe:0x78e6ff, exitNeon:'#78e6ff',
   ambient:0x5a5a9a, sun:0xb0a8ff, props:'city', clouds:false },
 { name:'SNOW VILLAGE', night:false,
   sky:['#8fb4dc','#c4d9ec','#eef2f8'], fog:0xc8dcee,
   ground:{base:'#d8e4f0', speck:'#bcd0e4', line:'rgba(90,130,180,.6)', arrow:'rgba(70,120,180,.95)'},
   slab:0xa8bcd4, barrier:0x8a6a4a, stripe:0xe84a5f, exitNeon:'#ff6b81',
   ambient:0xd0e0f4, sun:0xfff4e4, props:'snow', clouds:true },
 { name:'DESERT SUNSET', night:false,
   sky:['#5e3a6e','#c45a6e','#ffb070'], fog:0xd88a78,
   ground:{base:'#e8b070', speck:'#d49c5c', line:'rgba(120,60,50,.5)', arrow:'rgba(255,245,220,.95)'},
   slab:0xc4905a, barrier:0x9e5a44, stripe:0xffe8c8, exitNeon:'#ffa040',
   ambient:0xffc8a0, sun:0xffd0a8, props:'desert', clouds:false },
];

/* pastel fleet colors for blocker vehicles */
const PALETTE = [0xf9a8c2,0x9fd8a3,0xa8c6f0,0xf7cf8a,0xc9b6e8,0x8fd6d2,0xf2eda0,0xf0a89a,0xb0d8f0,0xd8c8a0,0xa0c8b8,0xe0b0d0,0x9ab8e0];

/* ---------------- renderer / scene ---------------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = .82;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfe6f7, 18, 48);

/* sky dome — texture regenerated per theme */
let skyMesh;
function buildSky(colors){
  const cv = document.createElement('canvas'); cv.width = 4; cv.height = 256;
  const g = cv.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,256);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(.55, colors[1]);
  grad.addColorStop(1, colors[2]);
  g.fillStyle = grad; g.fillRect(0,0,4,256);
  const tex = new THREE.CanvasTexture(cv);
  if(!skyMesh){
    skyMesh = new THREE.Mesh(
      new THREE.SphereGeometry(60, 24, 16),
      new THREE.MeshBasicMaterial({map:tex, side:THREE.BackSide, fog:false})
    );
    scene.add(skyMesh);
  } else {
    skyMesh.material.map = tex;
    skyMesh.material.needsUpdate = true;
  }
}

const camera = new THREE.PerspectiveCamera(46, 1, .1, 200);
const camTarget = new THREE.Vector3(0.4, 0, 0);
let azimuth = -0.45, polar = 0.95, camDist = 12.5;
function applyCamera(){
  camera.position.set(
    camTarget.x + camDist * Math.sin(polar) * Math.sin(azimuth),
    camTarget.y + camDist * Math.cos(polar),
    camTarget.z + camDist * Math.sin(polar) * Math.cos(azimuth)
  );
  camera.lookAt(camTarget);
}

/* ---------------- lights ---------------- */
const ambient = new THREE.AmbientLight(0xdcecff, .5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff4d6, .85);
sun.position.set(-8, 13, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -9; sun.shadow.camera.right = 9;
sun.shadow.camera.top = 9;   sun.shadow.camera.bottom = -9;
scene.add(sun);
const exitGlow = new THREE.PointLight(0xffd34d, 1.4, 7);
exitGlow.position.set(HALF + .6, 1.1, (EXIT_ROW + .5) * CELL - HALF);
scene.add(exitGlow);

/* ---------------- ground / board (rebuilt per theme) ---------------- */
function groundTexture(t){
  const cv = document.createElement('canvas'); cv.width = cv.height = 512;
  const g = cv.getContext('2d');
  g.fillStyle = t.base; g.fillRect(0,0,512,512);
  g.fillStyle = t.speck;
  for(let i=0;i<2600;i++){
    g.globalAlpha = .25 + Math.random()*.45;
    g.fillRect(Math.random()*512, Math.random()*512, 2.4, 2.4);
  }
  g.globalAlpha = 1;
  const s = 512 / N;
  g.strokeStyle = t.line; g.lineWidth = 3.5;
  g.setLineDash([15, 11]);
  for(let i=1;i<N;i++){
    g.beginPath(); g.moveTo(i*s,0); g.lineTo(i*s,512); g.stroke();
    g.beginPath(); g.moveTo(0,i*s); g.lineTo(512,i*s); g.stroke();
  }
  g.setLineDash([]);
  /* friendly arrows on the exit row */
  g.fillStyle = t.arrow;
  const rowY = (EXIT_ROW + .5) * s;
  for(let i=0;i<N;i++){
    const cx = (i + .55) * s;
    g.beginPath();
    g.moveTo(cx-12, rowY-13); g.lineTo(cx+8, rowY); g.lineTo(cx-12, rowY+13);
    g.lineTo(cx-4, rowY); g.closePath(); g.fill();
  }
  return new THREE.CanvasTexture(cv);
}

const board = new THREE.Mesh(
  new THREE.BoxGeometry(N*CELL, .3, N*CELL),
  new THREE.MeshStandardMaterial({roughness:.95})
);
board.position.y = -.15;
board.receiveShadow = true;
scene.add(board);

const slab = new THREE.Mesh(
  new THREE.BoxGeometry(N*CELL + 1.8, .8, N*CELL + 1.8),
  new THREE.MeshToonMaterial({color:0x6ca34d})
);
slab.position.y = -.7;
scene.add(slab);

/* big soft ground disk so the world doesn't float in fog */
const worldDisk = new THREE.Mesh(
  new THREE.CylinderGeometry(26, 26, .4, 36),
  new THREE.MeshToonMaterial({color:0x86c463})
);
worldDisk.position.y = -1.3;
worldDisk.receiveShadow = true;
scene.add(worldDisk);

/* ---------------- environment group (barriers, gate, props) ---------------- */
let envGroup = null;
const gapLo = EXIT_ROW * CELL - HALF, gapHi = gapLo + CELL;
const exitZ = (EXIT_ROW + .5) * CELL - HALF;
let confetti = [];

function toon(color){ return new THREE.MeshToonMaterial({color}); }

function buildEnvironment(theme){
  if(envGroup){ scene.remove(envGroup); }
  envGroup = new THREE.Group();

  buildSky(theme.sky);
  scene.fog.color.set(theme.fog);
  ambient.color.set(theme.ambient);
  ambient.intensity = theme.night ? .38 : .5;
  sun.color.set(theme.sun);
  sun.intensity = theme.night ? .42 : .85;
  exitGlow.color.set(theme.exitNeon);
  board.material.map = groundTexture(theme.ground);
  board.material.needsUpdate = true;
  slab.material.color.set(theme.slab);
  worldDisk.material.color.set(new THREE.Color(theme.ground.base).multiplyScalar(.92));

  /* --- rounded barriers with the exit gap --- */
  const bMat = toon(theme.barrier), sMat = toon(theme.stripe);
  function barrier(w, d, x, z){
    const b = new THREE.Mesh(new THREE.BoxGeometry(w, .5, d), bMat);
    b.position.set(x, .25, z); b.castShadow = b.receiveShadow = true;
    const cap = new THREE.Mesh(new THREE.BoxGeometry(w + .04, .14, d + .04), sMat);
    cap.position.set(x, .47, z);
    envGroup.add(b, cap);
  }
  const T = .45;
  barrier(N*CELL + 2*T, T, 0, -HALF - T/2);
  barrier(N*CELL + 2*T, T, 0,  HALF + T/2);
  barrier(T, N*CELL, -HALF - T/2, 0);
  barrier(T, gapLo + HALF, HALF + T/2, (gapLo - HALF)/2);
  barrier(T, HALF - gapHi, HALF + T/2, (gapHi + HALF)/2);

  /* --- cute EXIT gate: two striped posts + glowing sign + heart bunting --- */
  const postMat = toon(0xfffaf0);
  [gapLo + .03, gapHi - .03].forEach(z=>{
    const p = new THREE.Mesh(new THREE.CylinderGeometry(.09,.11,1.6,10), postMat);
    p.position.set(HALF + .28, .8, z); p.castShadow = true;
    envGroup.add(p);
    /* candy stripes */
    for(let k=0;k<4;k++){
      const ring = new THREE.Mesh(new THREE.TorusGeometry(.105,.028,6,14), toon(theme.exitNeon));
      ring.rotation.x = Math.PI/2;
      ring.position.set(HALF + .28, .25 + k*.4, z);
      envGroup.add(ring);
    }
  });
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 96;
  const g = cv.getContext('2d');
  g.fillStyle = '#fffaf0'; g.fillRect(0,0,256,96);
  g.strokeStyle = theme.exitNeon; g.lineWidth = 10;
  g.strokeRect(6,6,244,84);
  g.font = '800 50px "Trebuchet MS", Arial'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle = theme.exitNeon;
  g.fillText('EXIT →', 128, 52);
  const sign = new THREE.Mesh(
    new THREE.BoxGeometry(.1, .55, 1.4),
    new Array(6).fill(0).map((_,i)=> i===1
      ? new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv)})
      : new THREE.MeshBasicMaterial({color:0xfffaf0}))
  );
  sign.position.set(HALF + .28, 1.78, exitZ);
  envGroup.add(sign);
  const strip = new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, CELL * .92),
    new THREE.MeshBasicMaterial({color:theme.exitNeon, transparent:true, opacity:.28})
  );
  strip.rotation.x = -Math.PI/2;
  strip.position.set(HALF + .7, .006, exitZ);
  envGroup.add(strip);

  buildProps(theme);
  if(theme.clouds) buildClouds();
  scene.add(envGroup);
}

/* ---------------- prop builders ---------------- */
function addAt(obj, x, z){ obj.position.x += x; obj.position.z += z; envGroup.add(obj); return obj; }

function tree(scale=1, leaf=0x6fbf6a){
  const grp = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.09*scale,.13*scale,.6*scale,8), toon(0x8a5a3b));
  trunk.position.y = .3*scale; trunk.castShadow = true;
  const blob = (r,y,off=0)=>{ const m=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),toon(leaf)); m.position.set(off,y,off*.6); m.castShadow=true; return m; };
  grp.add(trunk, blob(.42*scale, .85*scale), blob(.3*scale, 1.05*scale, .22*scale), blob(.28*scale, .95*scale, -.24*scale));
  return grp;
}
function pine(scale=1, snowy=false){
  const grp = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.07*scale,.1*scale,.45*scale,8), toon(0x7a4a32));
  trunk.position.y = .22*scale; grp.add(trunk);
  const col = snowy ? 0x4a8a6a : 0x3f8f5f;
  [.55,.42,.3].forEach((r,i)=>{
    const c = new THREE.Mesh(new THREE.ConeGeometry(r*scale,.55*scale,9), toon(col));
    c.position.y = (.55 + i*.4)*scale; c.castShadow = true; grp.add(c);
    if(snowy){
      const cap = new THREE.Mesh(new THREE.ConeGeometry(r*scale*.7,.2*scale,9), toon(0xf4f8ff));
      cap.position.y = (.72 + i*.4)*scale; grp.add(cap);
    }
  });
  return grp;
}
function palm(scale=1){
  const grp = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.08*scale,.13*scale,1.5*scale,8), toon(0xb08050));
  trunk.position.y = .75*scale; trunk.rotation.z = .12; trunk.castShadow = true; grp.add(trunk);
  for(let i=0;i<6;i++){
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(.42*scale,8,6), toon(0x4fae6a));
    leaf.scale.set(1,.28,.42);
    const a = i/6*Math.PI*2;
    leaf.position.set(Math.cos(a)*.36*scale + .18, 1.52*scale, Math.sin(a)*.36*scale);
    leaf.rotation.y = -a; leaf.rotation.z = .35;
    grp.add(leaf);
  }
  const nut = new THREE.Mesh(new THREE.SphereGeometry(.09*scale,8,6), toon(0x7a5230));
  nut.position.set(.2, 1.4*scale, .1); grp.add(nut);
  return grp;
}
function sakuraTree(scale=1){ return tree(scale, 0xf7b8d4); }
function cactus(scale=1){
  const grp = new THREE.Group();
  const mat = toon(0x5fa86a);
  const main = new THREE.Mesh(new THREE.CylinderGeometry(.14*scale,.16*scale,1.1*scale,10), mat);
  main.position.y = .55*scale; main.castShadow = true; grp.add(main);
  const top = new THREE.Mesh(new THREE.SphereGeometry(.14*scale,8,6), mat);
  top.position.y = 1.1*scale; grp.add(top);
  [[-1,.6],[1,.75]].forEach(([s,h])=>{
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(.08*scale,.09*scale,.45*scale,8), mat);
    arm.position.set(s*.26*scale, h*scale, 0); grp.add(arm);
    const armTop = new THREE.Mesh(new THREE.SphereGeometry(.08*scale,8,6), mat);
    armTop.position.set(s*.26*scale, (h+.22)*scale, 0); grp.add(armTop);
    const elbow = new THREE.Mesh(new THREE.CylinderGeometry(.08*scale,.08*scale,.26*scale,8), mat);
    elbow.rotation.z = Math.PI/2;
    elbow.position.set(s*.16*scale, (h-.2)*scale, 0); grp.add(elbow);
  });

function building(w,h,d,color,windowColor){
  const grp = new THREE.Group();
  const b = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), toon(color));
  b.position.y = h/2; b.castShadow = true; grp.add(b);
  const wm = new THREE.MeshBasicMaterial({color:windowColor});
  for(let yy=.5; yy<h-.3; yy+=.55){
    for(let xx=-w/2+.3; xx<w/2-.2; xx+=.5){
      if(Math.random()<.35) continue;
      const win = new THREE.Mesh(new THREE.BoxGeometry(.22,.28,.03), wm);
      win.position.set(xx, yy, d/2+.02); grp.add(win);
    }
  }
  return grp;
}

function buildClouds(){
  for(let i=0;i<5;i++){
    const grp = new THREE.Group();
    const m = new THREE.MeshToonMaterial({color:0xffffff, transparent:true, opacity:.92, fog:false});
    const n = 3 + (i%2);
    for(let k=0;k<n;k++){
      const s = new THREE.Mesh(new THREE.SphereGeometry(.55 + Math.random()*.4, 10, 8), m);
      s.position.set(k*.7 - n*.3, Math.random()*.2, Math.random()*.4);
      grp.add(s);
    }
    const a = i/5*Math.PI*2;
    grp.position.set(Math.cos(a)*13, 6 + Math.random()*3, Math.sin(a)*13);
    grp.userData.cloud = {speed:.12 + Math.random()*.1, r:13 + Math.random()*4, a};
    envGroup.add(grp);
  }
}

      /* falling petals */
      for(let i=0;i<26;i++){

    case 'city':
      [[-7,-5,1.8,4.5,1.8,0x3a3f55],[-8,1,2,6,2,0x46405e],[7.5,-5.5,2,5.2,2,0x39435c],[8,2.5,1.8,3.8,1.8,0x4a3a58],[-6.5,6.5,2,4.8,2,0x3f3a52],[7,6.8,1.6,5.8,1.6,0x35405a]]

      [[-4.6,-1.4],[4.9,5.8],[-4.4,5.6]].forEach(([x,z])=> addAt(lampPost(0xaaf0ff), x, z));

      });
      break;
    case 'snow':
      ring(s=>pine(s,true), [[-5,-4.4,1.2],[-5.5,2.4,1],[5.6,-4.2,1.25],[5.1,4.8,1.05],[6.5,1.2,.9]]);
      addAt(snowman(1), -4.6, 5.2);
      addAt(snowman(.75), 6.2, -1.4);
      /* snowfall */
      for(let i=0;i<40;i++){
        const f = new THREE.Mesh(new THREE.SphereGeometry(.04,6,6), new THREE.MeshBasicMaterial({color:0xffffff}));
        f.position.set((Math.random()-.5)*15, Math.random()*6+.5, (Math.random()-.5)*15);
        f.userData.flake = {vy:.5+Math.random()*.5, wob:Math.random()*5};
        envGroup.add(f);
      }
      break;

      ring(s=>cactus(s), [[-5,-4.2,1.15],[-5.6,2.2,.95],[5.5,-4.4,1.2],[5.2,4.8,1],[6.6,1,.85]]);

}

function eyes(grp, x, y, w){
  const eyeMat = new THREE.MeshBasicMaterial({color:0xffffff});
  const pupilMat = new THREE.MeshBasicMaterial({color:0x2a2a33});
  [-w, w].forEach(z=>{
    const e = new THREE.Mesh(new THREE.SphereGeometry(.085, 10, 8), eyeMat);
    e.scale.set(.55, 1, 1);
    e.position.set(x, y, z);
    const p = new THREE.Mesh(new THREE.SphereGeometry(.042, 8, 6), pupilMat);
    p.position.set(x + .045, y + .01, z);
    grp.add(e, p);
  });
}
function wheels(grp, L, W, axles){
  const tire = toon(0x3a3a44);
  const hub = toon(0xfff6e8);
  axles.forEach(ax=>{
    [-W/2+.02, W/2-.02].forEach(wz=>{
      const w = new THREE.Mesh(new THREE.CylinderGeometry(.19,.19,.13,14), tire);
      w.rotation.x = Math.PI/2; w.position.set(ax, .19, wz); w.castShadow = true;
      const h = new THREE.Mesh(new THREE.CylinderGeometry(.09,.09,.14,10), hub);
      h.rotation.x = Math.PI/2; h.position.set(ax, .19, wz);
      grp.add(w, h);
    });
  });
}

    wheels(grp, L*.94, W, [-L/2+.34, L/2-.34]);
  }

  lightsFB(grp, L, W, isPlayer ? 0xfff3c4 : 0xf8efd0);
  if(!horiz) grp.rotation.y = -Math.PI/2;
  grp.traverse(o=>{ o.userData.car = grp; });
  return grp;
}

/* ---------------- game state ---------------- */
const cellToWorld = (cx, len)=> (cx + len/2) * CELL - HALF;
const laneToWorld = (cy)=> (cy + .5) * CELL - HALF;

let levelIdx = 0, cars = [], moves = 0, history = [], winning = false;

const ui = {
  lvl: document.getElementById('lvlNum'), themeName: document.getElementById('themeName'),
  moves: document.getElementById('moves'), par: document.getElementById('par'),
  overlay: document.getElementById('overlay'), stars: document.getElementById('stars'),
  winText: document.getElementById('winText'), hint: document.getElementById('hint'),
};

function clearCars(){ cars.forEach(c=>scene.remove(c.mesh)); cars = []; }

function loadLevel(i){
  levelIdx = (i + LEVELS.length) % LEVELS.length;
  clearCars();
  winning = false; moves = 0; history = [];
  confetti.forEach(p=>scene.remove(p.mesh)); confetti = [];
  ui.overlay.classList.remove('show');
  const def = LEVELS[levelIdx];
  const theme = THEMES[levelIdx % THEMES.length];
  buildEnvironment(theme);

  def.cars.forEach((c, idx)=>{
    const [x, y, len, o] = c;
    const horiz = o === 'h';
    const isPlayer = idx === 0;
    const color = isPlayer ? 0xe8453c : PALETTE[(levelIdx*5 + idx) % PALETTE.length];
    const pool = len === 2 ? TYPES2 : TYPES3;
    const type = isPlayer ? 'sedan' : pool[(levelIdx*3 + idx) % pool.length];
    const mesh = makeCar(len, horiz, color, isPlayer, type);
    const car = {mesh, len, horiz, isPlayer, lane: horiz ? y : x, p: horiz ? x : y};
    placeCar(car);
    scene.add(mesh);
    cars.push(car);
  });
  ui.lvl.textContent = levelIdx + 1;
  ui.themeName.textContent = theme.name;
  ui.par.textContent = def.par;
  ui.moves.textContent = '0';
  document.getElementById('prevBtn').disabled = levelIdx === 0;
}

function placeCar(car){
  const along = cellToWorld(car.p, car.len);
  const cross = laneToWorld(car.lane);
  car.mesh.position.set(car.horiz ? along : cross, 0, car.horiz ? cross : along);
}

function occupancy(except){
  const g = Array.from({length:N}, ()=>Array(N).fill(false));
  cars.forEach(c=>{
    if(c === except) return;
    for(let k=0;k<c.len;k++){
      const x = c.horiz ? c.p + k : c.lane;
      const y = c.horiz ? c.lane : c.p + k;
      g[y][x] = true;
    }
  });
  return g;
}

function slideRange(car){
  const g = occupancy(car);
  let lo = car.p, hi = car.p;
  while(lo > 0){
    const cell = lo - 1;
    const x = car.horiz ? cell : car.lane, y = car.horiz ? car.lane : cell;
    if(g[y][x]) break; lo--;
  }
  while(hi + car.len < N){
    const cell = hi + car.len;
    const x = car.horiz ? cell : car.lane, y = car.horiz ? car.lane : cell;
    if(g[y][x]) break; hi++;
  }
  return [lo, hi];
}

/* ---------------- input ---------------- */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
let drag = null, orbit = null;

function pointerNDC(e){
  const r = canvas.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
}

canvas.addEventListener('pointerdown', e=>{
  if(winning) return;
  canvas.setPointerCapture(e.pointerId);
  pointerNDC(e);
  ray.setFromCamera(ndc, camera);
  const meshes = [];
  cars.forEach(c=>c.mesh.traverse(o=>{ if(o.isMesh) meshes.push(o); }));
  const hit = ray.intersectObjects(meshes, false)[0];
  if(hit){
    const car = cars.find(c=>c.mesh === hit.object.userData.car);
    if(!car) return;
    const pt = new THREE.Vector3();
    ray.ray.intersectPlane(groundPlane, pt);
    const [lo, hi] = slideRange(car);
    drag = {
      car, lo, hi, startP: car.p,
      grabOffset: (car.horiz ? pt.x : pt.z) - cellToWorld(car.p, car.len),
    };
    ui.hint.style.opacity = 0;
  } else {
    orbit = {x:e.clientX, y:e.clientY, az:azimuth, po:polar};
  }
});

canvas.addEventListener('pointermove', e=>{
  if(drag){
    pointerNDC(e);
    ray.setFromCamera(ndc, camera);
    const pt = new THREE.Vector3();
    if(!ray.ray.intersectPlane(groundPlane, pt)) return;
    const target = (drag.car.horiz ? pt.x : pt.z) - drag.grabOffset;
    const minW = cellToWorld(drag.lo, drag.car.len);
    let maxW = cellToWorld(drag.hi, drag.car.len);
    const canExit = drag.car.isPlayer && drag.hi + drag.car.len === N;
    if(canExit) maxW += .9;
    const clamped = Math.max(minW, Math.min(maxW, target));
    const pos = drag.car.mesh.position;
    if(drag.car.horiz) pos.x = clamped; else pos.z = clamped;
    if(canExit && clamped > cellToWorld(drag.hi, drag.car.len) + .55){
      commitDrag(drag.hi);
      startWin();
    }
  } else if(orbit){
    const dx = (e.clientX - orbit.x) * .005;
    const dy = (e.clientY - orbit.y) * .004;
    azimuth = orbit.az - dx;
    polar = Math.max(.35, Math.min(1.25, orbit.po - dy));
  }
});

function commitDrag(snapP){
  const d = drag; drag = null;
  if(!d) return;
  if(snapP !== d.startP){
    history.push({car:d.car, from:d.startP});
    d.car.p = snapP;
    moves++; ui.moves.textContent = moves;
  } else {
    d.car.p = snapP;
  }
  placeCar(d.car);
}

canvas.addEventListener('pointerup', e=>{
  if(drag && !winning){
    const along = drag.car.horiz ? drag.car.mesh.position.x : drag.car.mesh.position.z;
    let snap = Math.round((along + HALF) / CELL - drag.car.len/2);
    snap = Math.max(drag.lo, Math.min(drag.hi, snap));
    commitDrag(snap);
    if(drag === null && cars[0].p + cars[0].len === N && !winning) startWin();
  }
  orbit = null;
});
canvas.addEventListener('pointercancel', ()=>{ if(drag) commitDrag(drag.startP); orbit = null; });
canvas.addEventListener('wheel', e=>{
  camDist = Math.max(7, Math.min(20, camDist + e.deltaY * .01));
}, {passive:true});

/* ---------------- win sequence + confetti ---------------- */
let winAnim = null;
const CONF_COLORS = [0xff7d9c,0xffd34d,0x8fd6d2,0xa8c6f0,0xc9b6e8,0x9fd8a3];
function popConfetti(){
  for(let i=0;i<60;i++){
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(.09,.13),
      new THREE.MeshBasicMaterial({color:CONF_COLORS[i % CONF_COLORS.length], side:THREE.DoubleSide})
    );
    m.position.set(HALF + .6 + Math.random()*.6, 1.4 + Math.random(), exitZ + (Math.random()-.5)*1.2);
    scene.add(m);
    confetti.push({mesh:m,
      vx:(Math.random()-.2)*2.2, vy:2 + Math.random()*2.4, vz:(Math.random()-.5)*2.4,
      rs:(Math.random()-.5)*10, life:0});
  }
}
function startWin(){
  winning = true; drag = null;
  winAnim = {t:0, car:cars[0]};
  popConfetti();
  setTimeout(()=>{
    const par = LEVELS[levelIdx].par;
    const s = moves <= par ? 3 : moves <= par + 3 ? 2 : 1;
    ui.stars.innerHTML = '⭐'.repeat(s) + `<span class="off">${'⭐'.repeat(3-s)}</span>`;
    ui.winText.textContent = `Escaped in ${moves} move${moves===1?'':'s'} · par ${par}`;
    document.getElementById('advanceBtn').textContent =
      levelIdx === LEVELS.length - 1 ? '↺ PLAY AGAIN' : 'NEXT LEVEL ▶';
    ui.overlay.classList.add('show');
  }, 1300);
}

/* ---------------- buttons ---------------- */
document.getElementById('resetBtn').onclick = ()=> loadLevel(levelIdx);
document.getElementById('undoBtn').onclick = ()=>{
  if(winning || !history.length) return;
  const last = history.pop();
  last.car.p = last.from;
  placeCar(last.car);
  moves = Math.max(0, moves - 1); ui.moves.textContent = moves;
};
document.getElementById('prevBtn').onclick = ()=> loadLevel(levelIdx - 1);
document.getElementById('nextBtn').onclick = ()=> loadLevel(levelIdx + 1);
document.getElementById('replayBtn').onclick = ()=> loadLevel(levelIdx);
document.getElementById('advanceBtn').onclick = ()=> loadLevel(levelIdx + 1);

/* ---------------- resize & loop ---------------- */
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  exitGlow.intensity = 1.3 + Math.sin(t * 2.4) * .35;

  /* idle squash-bounce on the red car */
  const red = cars[0];
  if(red && !winning){
    const s = 1 + Math.sin(t * 3.4) * .018;
    red.mesh.scale.set(1/Math.sqrt(s), s, 1/Math.sqrt(s));
  }

  /* ease cars to snapped spots */
  cars.forEach(c=>{
    if(drag && drag.car === c) return;
    if(winning && c.isPlayer) return;
    const tx = c.horiz ? cellToWorld(c.p, c.len) : laneToWorld(c.lane);
    const tz = c.horiz ? laneToWorld(c.lane) : cellToWorld(c.p, c.len);
    c.mesh.position.x += (tx - c.mesh.position.x) * Math.min(1, dt * 14);
    c.mesh.position.z += (tz - c.mesh.position.z) * Math.min(1, dt * 14);
  });

  /* animated environment bits */
  if(envGroup){
    envGroup.children.forEach(o=>{
      if(o.userData.cloud){
        const c = o.userData.cloud;
        c.a += c.speed * dt * .15;
        o.position.x = Math.cos(c.a) * c.r;
        o.position.z = Math.sin(c.a) * c.r;
      }
      if(o.userData.petal){
        o.position.y -= o.userData.petal.vy * dt;
        o.position.x += Math.sin(t + o.userData.petal.spin) * dt * .3;
        o.rotation.x += dt * 2; o.rotation.y += dt * 1.4;
        if(o.position.y < 0) o.position.y = 5 + Math.random()*2;
      }
      if(o.userData.flake){
        o.position.y -= o.userData.flake.vy * dt;
        o.position.x += Math.sin(t*2 + o.userData.flake.wob) * dt * .25;
        if(o.position.y < 0) o.position.y = 6;
      }
      if(o.userData.tumble){
        o.position.x -= dt * .8;
        o.rotation.z += dt * 2.5;
        if(o.position.x < -9) o.position.x = 9;
      }
    });
  }

  /* confetti physics */
  for(let i=confetti.length-1;i>=0;i--){
    const p = confetti[i];
    p.life += dt;
    p.vy -= 5 * dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += p.rs * dt;
    p.mesh.rotation.y += p.rs * .7 * dt;
    if(p.mesh.position.y < -.5 || p.life > 4){
      scene.remove(p.mesh);
      confetti.splice(i,1);
    }
  }

  /* drive-out animation */
  if(winAnim){
    winAnim.t += dt;
    const car = winAnim.car;
    const speed = 1.5 + winAnim.t * 4;
    car.mesh.position.x += speed * dt;
    /* happy hop */
    car.mesh.position.y = Math.abs(Math.sin(winAnim.t * 9)) * .12;
    car.mesh.scale.setScalar(1);
    if(winAnim.t > 2.2){ winAnim = null; }
  }

  applyCamera();
  renderer.render(scene, camera);
}

loadLevel(0);
loop();
setTimeout(()=>{ ui.hint.style.opacity = 0; }, 9000);
</script>
</body>
